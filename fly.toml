# Fly.io configuration for Mission Control

app = "mission-control-ryan"
primary_region = "iad"  # Washington DC region for lowest latency

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[env]
  NODE_ENV = "production"
  PORT = "3000"
  NIGHT_WATCH_STORE_DIR = "/data/night-watch"

[mounts]
  source = "mission_control_data"
  destination = "/data"